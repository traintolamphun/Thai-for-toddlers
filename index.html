<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thai Time</title>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #timer-bg { height: 8px; background: #334155; width: 100%; }
        #timer-fill { height: 100%; background: #4ade80; width: 100%; transition: width 1s linear; }
        #card { flex: 1; margin: 20px; background: white; border-radius: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 6px solid #FFD700; color: #1e293b; padding: 15px; }
        img { max-width: 90%; max-height: 45%; border-radius: 15px; object-fit: contain; }
        h1 { font-size: 55px; margin: 15px 0 5px 0; }
        p { font-size: 22px; color: #64748b; margin: 0; }
        #end { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; justify-content: center; align-items: center; flex-direction: column; z-index: 100; }
    </style>
</head>
<body>
    <div id="timer-bg"><div id="timer-fill"></div></div>
    
    <div id="card" onclick="playNext()">
        <img id="pic" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMzM5amR4ZGZ4YmZ6Z3R6bmZzZ3F6c2Z6eGZ6eGZ6eGZ6eGZ6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/v8857rM5N1Zsc/giphy.gif">
        <h1 id="thai">ช้าง</h1>
        <p id="eng">Chaang (Elephant)</p>
    </div>

    <div id="end">
        <div style="font-size: 80px;">😴</div>
        <h1>ฝันดี</h1>
        <p>Goodnight! Time for bed.</p>
    </div>

    <script>
        const cards = [
            {g:"https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMzM5amR4ZGZ4YmZ6Z3R6bmZzZ3F6c2Z6eGZ6eGZ6eGZ6eGZ6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/v8857rM5N1Zsc/giphy.gif", t:"ช้าง", e:"Chaang (Elephant)"},
            {g:"https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNXN6ZzR6Z3R6bmZzZ3F6c2Z6eGZ6eGZ6eGZ6eGZ6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/ICOgUNoHOvGtu/giphy.gif", t:"แมว", e:"Maew (Cat)"},
            {g:"https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNXN6ZzR6Z3R6bmZzZ3F6c2Z6eGZ6eGZ6eGZ6eGZ6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/q7776f8e754zC/giphy.gif", t:"นก", e:"Nok (Bird)"},
            {g:"https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNGR6ZzR6Z3R6bmZzZ3F6c2Z6eGZ6eGZ6eGZ6eGZ6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/kFfS62SsuK800/giphy.gif", t:"อาบน้ำ", e:"Arp-Nam (Bath)"},
            {g:"https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNXA5amR4ZGZ4YmZ6Z3R6bmZzZ3F6c2Z6eGZ6eGZ6eGZ6eGZ6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o6fJ8b6m8m8z8p/giphy.gif", t:"นอน", e:"Norn (Sleep)"}
        ];
        
        let idx = 0;
        let timeLeft = 300; 

        function playNext() {
            // First, trigger audio
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(cards[idx].t);
            msg.lang = 'th-TH';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);

            // Then cycle to next card after a small delay
            setTimeout(() => {
                idx = (idx + 1) % cards.length;
                document.getElementById('pic').src = cards[idx].g;
                document.getElementById('thai').innerText = cards[idx].t;
                document.getElementById('eng').innerText = cards[idx].e;
            }, 1200);
        }

        // Timer Loop
        const tick = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-fill').style.width = (timeLeft/300)*100 + "%";
            if(timeLeft <= 0) {
                clearInterval(tick);
                document.getElementById('end').style.display = 'flex';
            }
        }, 1000);
    </script>
</body>
</html>
